name: release
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-24.04
    outputs:
      release_body: ${{ steps.notes.outputs.body }}
    steps:
      - name: checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: validate gradle wrapper
        uses: gradle/actions/wrapper-validation@v5

      - name: setup jdk
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'microsoft'

      - name: setup gradle
        uses: gradle/actions/setup-gradle@v5

      - name: make gradle wrapper executable
        run: chmod +x ./gradlew

      - name: verify tag matches mod version
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          VERSION="$(grep '^mod_version=' gradle.properties | cut -d= -f2)"
          if [ "v${VERSION}" != "${TAG_NAME}" ]; then
            echo "Expected tag v${VERSION}, got ${TAG_NAME}"
            exit 1
          fi

      - name: build
        run: ./gradlew clean build

      - name: collect release artifacts
        run: |
          mkdir -p release-artifacts
          cp build/libs/*.jar release-artifacts/
          rm -f release-artifacts/*-dev.jar
          rm -f release-artifacts/*-sources.jar
          rm -f release-artifacts/*-javadoc.jar

      - name: upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-artifacts
          path: release-artifacts/*.jar
          if-no-files-found: error

      - name: read release notes from tag annotation
        id: notes
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          git fetch --force origin "refs/tags/${TAG_NAME}:refs/tags/${TAG_NAME}"
          NOTES="$(git for-each-ref "refs/tags/${TAG_NAME}" --format='%(contents)')"

          {
            echo 'body<<EOF'
            printf '%s\n' "$NOTES"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: release-artifacts/*.jar
          body: ${{ steps.notes.outputs.body }}
          generate_release_notes: ${{ steps.notes.outputs.body == '' }}
          prerelease: ${{ contains(github.ref_name, '-') }}

  maven-central:
    needs: release
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: check Maven Central secrets
        id: config
        env:
          CENTRAL_PORTAL_USERNAME: ${{ secrets.CENTRAL_PORTAL_USERNAME }}
          CENTRAL_PORTAL_PASSWORD: ${{ secrets.CENTRAL_PORTAL_PASSWORD }}
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
        run: |
          if [ -z "${CENTRAL_PORTAL_USERNAME}" ] || [ -z "${CENTRAL_PORTAL_PASSWORD}" ] || [ -z "${SIGNING_KEY}" ] || [ -z "${SIGNING_PASSWORD}" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping Maven Central publish because Central Portal or signing secrets are not configured."
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: checkout repository
        if: steps.config.outputs.enabled == 'true'
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: validate gradle wrapper
        if: steps.config.outputs.enabled == 'true'
        uses: gradle/actions/wrapper-validation@v5

      - name: setup jdk
        if: steps.config.outputs.enabled == 'true'
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'microsoft'

      - name: setup gradle
        if: steps.config.outputs.enabled == 'true'
        uses: gradle/actions/setup-gradle@v5

      - name: make gradle wrapper executable
        if: steps.config.outputs.enabled == 'true'
        run: chmod +x ./gradlew

      - name: publish to Maven Central
        if: steps.config.outputs.enabled == 'true'
        env:
          CENTRAL_PORTAL_USERNAME: ${{ secrets.CENTRAL_PORTAL_USERNAME }}
          CENTRAL_PORTAL_PASSWORD: ${{ secrets.CENTRAL_PORTAL_PASSWORD }}
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
        run: ./gradlew publishToMavenCentral -PcentralPublishingType=automatic
