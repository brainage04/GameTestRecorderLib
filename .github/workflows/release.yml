name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  prepare:
    permissions:
      contents: write
    uses: brainage04/FabricModdingConventions/.github/workflows/reusable-release-prepare.yml@v2.1.0
    with:
      resolve_release_notes_with_gradle: false
    secrets:
      release_token: ${{ secrets.GITHUB_TOKEN }}

  github:
    needs: prepare
    permissions:
      contents: write
    uses: brainage04/FabricModdingConventions/.github/workflows/reusable-publish-github.yml@v2.1.0
    with:
      artifact_file: ${{ needs.prepare.outputs.artifact_file }}
      release_body: ${{ needs.prepare.outputs.release_body }}
      publish_with_gradle: false
      release_name: FabricModdingConventions 2.1.0
    secrets:
      release_token: ${{ secrets.GITHUB_TOKEN }}

  maven-central:
    needs: prepare
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: check Maven Central secrets
        id: config
        env:
          CENTRAL_PORTAL_USERNAME: ${{ secrets.CENTRAL_PORTAL_USERNAME }}
          CENTRAL_PORTAL_PASSWORD: ${{ secrets.CENTRAL_PORTAL_PASSWORD }}
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
        run: |
          if [ -z "${CENTRAL_PORTAL_USERNAME}" ] || [ -z "${CENTRAL_PORTAL_PASSWORD}" ] || [ -z "${SIGNING_KEY}" ] || [ -z "${SIGNING_PASSWORD}" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping Maven Central publish because Central Portal or signing secrets are not configured."
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: checkout repository
        if: steps.config.outputs.enabled == 'true'
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: validate gradle wrapper
        if: steps.config.outputs.enabled == 'true'
        uses: gradle/actions/wrapper-validation@v5

      - name: setup jdk
        if: steps.config.outputs.enabled == 'true'
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: microsoft

      - name: setup gradle
        if: steps.config.outputs.enabled == 'true'
        uses: gradle/actions/setup-gradle@v5

      - name: make gradle wrapper executable
        if: steps.config.outputs.enabled == 'true'
        run: chmod +x ./gradlew

      - name: publish to Maven Central
        if: steps.config.outputs.enabled == 'true'
        env:
          CENTRAL_PORTAL_USERNAME: ${{ secrets.CENTRAL_PORTAL_USERNAME }}
          CENTRAL_PORTAL_PASSWORD: ${{ secrets.CENTRAL_PORTAL_PASSWORD }}
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
        run: ./gradlew publishToMavenCentral -PcentralPublishingType=automatic
