name: reusable GitHub publication

on:
  workflow_call:
    inputs:
      artifact_file:
        description: Exact release JAR file name from release preparation
        required: true
        type: string
      release_body:
        description: Release notes shared across destinations
        required: true
        type: string
      java_version:
        description: JDK version used by the Fabric build
        required: false
        default: '25'
        type: string
    secrets:
      release_token:
        description: GitHub token with contents write permission
        required: true

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-24.04
    steps:
      - name: checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: validate gradle wrapper
        uses: gradle/actions/wrapper-validation@v5

      - name: setup jdk
        uses: actions/setup-java@v5
        with:
          java-version: ${{ inputs.java_version }}
          distribution: microsoft

      - name: setup gradle
        uses: gradle/actions/setup-gradle@v5

      - name: make gradle wrapper executable
        run: chmod +x ./gradlew

      - name: download exact release artifact
        uses: actions/download-artifact@v7
        with:
          name: release-artifact
          path: release-artifacts

      - name: publish GitHub release
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_TOKEN: ${{ secrets.release_token }}
          MOD_PUBLISHING_RELEASE_JAR: release-artifacts/${{ inputs.artifact_file }}
          RELEASE_BODY: ${{ inputs.release_body }}
          RELEASE_PRERELEASE: ${{ contains(github.ref_name, '-') }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: ./gradlew publishGithub -PpublishGithub=true
