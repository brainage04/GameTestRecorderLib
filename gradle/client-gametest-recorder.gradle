import groovy.json.JsonOutput
import org.gradle.api.GradleException
import org.gradle.api.file.DirectoryProperty
import org.gradle.api.file.ProjectLayout
import org.gradle.api.model.ObjectFactory
import org.gradle.api.provider.ListProperty
import org.gradle.api.provider.Property

import java.nio.charset.StandardCharsets
import java.nio.file.Files
import java.nio.file.StandardCopyOption
import java.time.Instant
import java.time.ZoneOffset
import java.time.format.DateTimeFormatter

class ClientGameTestRecorderExtension {
	final Property<String> enabledProperty
	final ListProperty<String> additionalEnabledProperties
	final Property<String> recordingAudioDeviceProperty
	final Property<String> recordingAudioDeviceEnv
	final Property<String> managedXvfbEnv
	final DirectoryProperty runDir
	final Property<String> minecraftOptionsVersion
	final Property<String> maxFps
	final Property<String> renderDistance
	final Property<String> simulationDistance
	final Property<String> guiScale
	final Property<String> fullscreen

	ClientGameTestRecorderExtension(ObjectFactory objects, ProjectLayout layout) {
		enabledProperty = objects.property(String).convention('gametestrecorderlib.clientGameTest')
		additionalEnabledProperties = objects.listProperty(String).convention([])
		recordingAudioDeviceProperty = objects.property(String).convention('gameTestRecorderRecordingAudioDevice')
		recordingAudioDeviceEnv = objects.property(String).convention('GTR_RECORDING_AUDIO_DEVICE')
		managedXvfbEnv = objects.property(String).convention('GTR_RECORDING_MANAGED_XVFB')
		runDir = objects.directoryProperty().convention(layout.buildDirectory.dir('run/clientGameTest'))
		minecraftOptionsVersion = objects.property(String).convention('4671')
		maxFps = objects.property(String).convention('30')
		renderDistance = objects.property(String).convention('5')
		simulationDistance = objects.property(String).convention('5')
		guiScale = objects.property(String).convention('1')
		fullscreen = objects.property(String).convention('true')
	}
}

class RecordingCommandFailure extends RuntimeException {
	RecordingCommandFailure(String message) {
		super(message)
	}
}

def extension = extensions.create('clientGameTestRecorder', ClientGameTestRecorderExtension, objects, layout)

def prepareTask = tasks.register('prepareClientGameTestRun') {
	def audioDevice = extension.recordingAudioDeviceProperty.flatMap { propertyName ->
		providers.gradleProperty(propertyName)
	}.orElse(extension.recordingAudioDeviceEnv.flatMap { envName ->
		providers.environmentVariable(envName)
	}).orElse('')
	def optionsFile = extension.runDir.map { it.file('options.txt') }

	inputs.property('recordingAudioDevice', audioDevice)
	inputs.property('minecraftOptionsVersion', extension.minecraftOptionsVersion)
	inputs.property('maxFps', extension.maxFps)
	inputs.property('renderDistance', extension.renderDistance)
	inputs.property('simulationDistance', extension.simulationDistance)
	inputs.property('guiScale', extension.guiScale)
	inputs.property('fullscreen', extension.fullscreen)
	outputs.file(optionsFile)

	doLast {
		def soundDevice = audioDevice.get()
		def masterVolume = soundDevice.isBlank() ? '0.0' : '1.0'
		def settings = [
				version                  : extension.minecraftOptionsVersion.get(),
				ao                       : 'false',
				autoJump                 : 'false',
				biomeBlendRadius         : '0',
				chunkSectionFadeInTime   : '0.0',
				enableVsync              : 'false',
				entityDistanceScaling    : '0.5',
				entityShadows            : 'false',
				fullscreen               : extension.fullscreen.get(),
				graphicsPreset           : '"fast"',
				guiScale                 : extension.guiScale.get(),
				improvedTransparency     : 'false',
				maxAnisotropyBit         : '1',
				maxFps                   : extension.maxFps.get(),
				menuBackgroundBlurriness : '0',
				mipmapLevels             : '0',
				narrator                 : '0',
				narratorHotkey           : 'false',
				particles                : '2',
				prioritizeChunkUpdates   : '0',
				renderClouds             : '"false"',
				renderDistance           : extension.renderDistance.get(),
				simulationDistance       : extension.simulationDistance.get(),
				soundDevice              : "\"${soundDevice}\"",
				soundCategory_master     : masterVolume,
				soundCategory_music      : '0.0',
				toggleSprint             : 'false',
				weatherRadius            : '5'
		]
		def file = optionsFile.get().asFile

		file.parentFile.mkdirs()
		file.text = settings.collect { key, value -> "${key}:${value}" }.join(System.lineSeparator()) + System.lineSeparator()
	}
}

prepareTask.configure {
	mustRunAfter(tasks.matching { it.name == 'deleteGameTestRunDir' })
}

String.metaClass.gtrTruthy = {
	def value = delegate == null ? '' : delegate.toString().toLowerCase(Locale.ROOT)
	value in ['1', 'true', 'yes', 'on']
}

def gtrEnv = { String name, String fallback ->
	def value = providers.environmentVariable(name).orNull
	value == null || value.isBlank() ? fallback : value
}

def sanitizePathComponent = { String value ->
	def sanitized = (value ?: 'client-gametest').replaceAll(/[^A-Za-z0-9._-]/, '-')
	while (sanitized.contains('--')) {
		sanitized = sanitized.replace('--', '-')
	}
	sanitized = sanitized.replaceAll(/^-+/, '').replaceAll(/-+$/, '')
	sanitized.isBlank() ? 'client-gametest' : sanitized
}

def requireTool = { String name ->
	def path = ['sh', '-c', "command -v ${name}"].execute(null, project.projectDir)
	path.waitFor()
	if (path.exitValue() != 0) {
		throw new GradleException("Missing required tool: ${name}")
	}
}

def runCommand = { List<String> command, Map<String, String> environment = [:], boolean allowFailure = false ->
	def builder = new ProcessBuilder(command.collect { it.toString() })
	builder.directory(project.projectDir)
	builder.redirectErrorStream(true)
	builder.environment().putAll(environment)
	def process = builder.start()
	def output = process.inputStream.getText(StandardCharsets.UTF_8.name())
	def status = process.waitFor()
	if (status != 0 && !allowFailure) {
		throw new RecordingCommandFailure("Command failed (${status}): ${command.join(' ')}\n${output}")
	}
	[status: status, output: output]
}

def findFreeXvfbDisplay = {
	for (int number = 90; number <= 130; number++) {
		if (!file("/tmp/.X${number}-lock").exists() && !file("/tmp/.X11-unix/X${number}").exists()) {
			return number.toString()
		}
	}
	throw new GradleException('Expected to find a free X display between :90 and :130.')
}

def waitForXDisplay = { String displayName, Process xvfbProcess ->
	long deadline = System.currentTimeMillis() + 10_000L
	while (System.currentTimeMillis() < deadline) {
		if (!xvfbProcess.isAlive()) {
			throw new GradleException('Xvfb exited before becoming ready.')
		}
		def check = runCommand(['xdpyinfo', '-display', displayName], [:], true)
		if (check.status == 0) {
			return
		}
		Thread.sleep(100L)
	}
	throw new GradleException("Timed out waiting for X display ${displayName}.")
}

def findPipeWireNodeIdByName = { String nodeName ->
	def result = runCommand(['pw-cli', 'list-objects', 'Node'], [:], true)
	if (result.status != 0) {
		return ''
	}
	String currentId = ''
	for (String line : result.output.readLines()) {
		def idMatch = line =~ /^\s*id\s+(\d+),/
		if (idMatch.find()) {
			currentId = idMatch.group(1)
		}
		if (line.contains('node.name') && line.contains('"' + nodeName + '"') && !currentId.isBlank()) {
			return currentId
		}
	}
	''
}

def createVirtualAudioSink = { String sinkName ->
	runCommand([
			'pw-cli',
			'create-node',
			'adapter',
			"{ factory.name = support.null-audio-sink node.name = \"${sinkName}\" node.description = \"GameTestRecorderLib Recording Null Sink\" media.class = Audio/Sink object.linger = true priority.driver = 1 priority.session = 1 node.autoconnect = false audio.position = [ FL FR ] }"
	])
	for (int attempt = 0; attempt < 20; attempt++) {
		def id = findPipeWireNodeIdByName(sinkName)
		if (!id.isBlank()) {
			return id
		}
		Thread.sleep(100L)
	}
	throw new GradleException("Expected to create a virtual PipeWire null sink for GameTest recording audio: ${sinkName}")
}

def currentDefaultAudioSinkId = {
	def result = runCommand(['wpctl', 'status'], [:], true)
	if (result.status != 0) {
		return ''
	}
	for (String line : result.output.readLines()) {
		if (line.contains('*')) {
			def match = line =~ /\*\s*(\d+)\./
			if (match.find()) {
				return match.group(1)
			}
		}
	}
	''
}

def copyDirectory = { File source, File target ->
	if (target.exists()) {
		throw new GradleException("Refusing to overwrite existing kept run directory: ${target}")
	}
	Files.walk(source.toPath()).forEach { sourcePath ->
		def relative = source.toPath().relativize(sourcePath)
		def targetPath = target.toPath().resolve(relative)
		if (Files.isDirectory(sourcePath)) {
			Files.createDirectories(targetPath)
		} else {
			Files.createDirectories(targetPath.parent)
			Files.copy(sourcePath, targetPath, StandardCopyOption.COPY_ATTRIBUTES)
		}
	}
}

tasks.register('recordClientGameTest') {
	group = 'verification'
	description = 'Runs the Fabric client GameTest task under a recorded Xvfb/PipeWire/ffmpeg session.'

	doLast {
		['ffmpeg', 'ffprobe', 'Xvfb', 'xdpyinfo', 'pw-cli', 'wpctl'].each(requireTool)

		def timestamp = DateTimeFormatter.ofPattern('yyyyMMdd-HHmmss').withZone(ZoneOffset.UTC).format(Instant.now())
		def recordingDir = file(gtrEnv('GTR_RECORDING_DIR', 'build/recordings'))
		def recordingName = gtrEnv('GTR_RECORDING_NAME', 'client-gametest')
		def recordingProfile = gtrEnv('GTR_RECORDING_PROFILE', gtrEnv('CLIENT_GAMETEST_PROFILE', 'showcase'))
		def recordingTrace = gtrEnv('GTR_RECORDING_TRACE', 'false')
		def runDir = file(gtrEnv('GTR_RECORDING_RUN_DIR', 'build/run/clientGameTest'))
		def fps = gtrEnv('GTR_RECORDING_FPS', '30')
		def startWaitSeconds = gtrEnv('GTR_RECORDING_START_WAIT_SECONDS', '90') as int
		def xvfbScreen = gtrEnv('GTR_RECORDING_XVFB_SCREEN', '1920x1080x24')
		def setDefaultAudio = gtrEnv('GTR_RECORDING_AUDIO_SET_DEFAULT', 'false').gtrTruthy()
		def safeRecordingName = sanitizePathComponent(recordingName)
		def output = new File(recordingDir, "${safeRecordingName}-${timestamp}.mp4")
		def metadata = new File(recordingDir, "${safeRecordingName}-${timestamp}.json")
		def startSignal = new File(recordingDir, ".${safeRecordingName}-${timestamp}.start")
		def readySignal = new File(recordingDir, ".${safeRecordingName}-${timestamp}.ready")
		def alsoftConfig = new File(recordingDir, ".${safeRecordingName}-${timestamp}-alsoft.conf")
		def audioSinkName = gtrEnv('GTR_RECORDING_AUDIO_SINK_NAME', "gametest_recorder_${timestamp}")
		def audioSource = "${audioSinkName}.monitor"
		def keptRunDir = new File(recordingDir, "${safeRecordingName}-${timestamp}-run")
		def recordingStartedAt = DateTimeFormatter.ISO_INSTANT.format(Instant.now())
		def xvfbDisplay = gtrEnv('GTR_RECORDING_XVFB_DISPLAY', '')
		def xvfbProcess = null
		def gradleProcess = null
		def ffmpegProcess = null
		def audioSinkId = ''
		def previousDefaultSinkId = ''
		def gradleStatus = 1
		def videoSaved = false
		def audioSaved = false
		def recordingStatus = 0
		def processEnvironment = new LinkedHashMap<String, String>(System.getenv())

		recordingDir.mkdirs()
		startSignal.delete()
		readySignal.delete()

		try {
			if (xvfbDisplay.isBlank()) {
				xvfbDisplay = findFreeXvfbDisplay()
			}
			if (!xvfbDisplay.startsWith(':')) {
				xvfbDisplay = ':' + xvfbDisplay
			}
			logger.lifecycle("Starting virtual X display ${xvfbDisplay} (${xvfbScreen})...")
			xvfbProcess = new ProcessBuilder(['Xvfb', xvfbDisplay, '-screen', '0', xvfbScreen, '-nolisten', 'tcp'].collect { it.toString() })
					.redirectErrorStream(true)
					.start()
			waitForXDisplay(xvfbDisplay, xvfbProcess)

			audioSinkId = createVirtualAudioSink(audioSinkName)
			if (setDefaultAudio) {
				previousDefaultSinkId = currentDefaultAudioSinkId()
				runCommand(['wpctl', 'set-default', audioSinkId])
			}

			alsoftConfig.text = """[general]
drivers = pulse

[pulse]
device = ${audioSinkName}
allow-moves = false
"""
			logger.lifecycle("Routing GameTest audio to virtual PipeWire sink: ${audioSinkName}")
			logger.lifecycle("Recording audio from PulseAudio monitor source: ${audioSource}")

			processEnvironment.clear()
			processEnvironment.putAll(System.getenv())
			processEnvironment.put('DISPLAY', xvfbDisplay)
			processEnvironment.put('ALSOFT_CONF', alsoftConfig.absolutePath)
			processEnvironment.put('ALSOFT_DRIVERS', 'pulse')
			processEnvironment.put('PULSE_SINK', audioSinkName)
			processEnvironment.put('GTR_RECORDING_AUDIO_DEVICE', 'GameTestRecorderLib Recording Null Sink')
			processEnvironment.put('GTR_RECORDING_MANAGED_XVFB', 'true')
			processEnvironment.put('GTR_RECORDING_NAME', recordingName)
			processEnvironment.put('GTR_RECORDING_PROFILE', recordingProfile)
			processEnvironment.put('GTR_RECORDING_TRACE', recordingTrace)
			processEnvironment.put('CLIENT_GAMETEST_RECORDING_NAME', recordingName)
			processEnvironment.put('CLIENT_GAMETEST_RECORDING_PROFILE', recordingProfile)
			processEnvironment.put('CLIENT_GAMETEST_RECORDING_TRACE', recordingTrace)
			processEnvironment.put('CLIENT_GAMETEST_RECORDING_START_SIGNAL', startSignal.absolutePath)
			processEnvironment.put('CLIENT_GAMETEST_RECORDING_READY_SIGNAL', readySignal.absolutePath)
			if (!recordingProfile.isBlank()) {
				processEnvironment.putIfAbsent('CLIENT_GAMETEST_PROFILE', recordingProfile)
			}

			def gradleCommand = ['./gradlew', '--no-daemon', "-PgameTestRecorderRecordingAudioDevice=GameTestRecorderLib Recording Null Sink", 'runClientGameTest']
			logger.lifecycle('Starting client GameTest...')
			def gradleBuilder = new ProcessBuilder(gradleCommand.collect { it.toString() })
			gradleBuilder.directory(project.projectDir)
			gradleBuilder.redirectErrorStream(true)
			gradleBuilder.environment().clear()
			gradleBuilder.environment().putAll(processEnvironment)
			gradleProcess = gradleBuilder.start()
			def logThread = Thread.startDaemon('client-gametest-output') {
				gradleProcess.inputStream.eachLine(StandardCharsets.UTF_8.name()) { line ->
					println(line)
				}
			}

			logger.lifecycle('Waiting for client GameTest recording-start signal...')
			long signalDeadline = System.currentTimeMillis() + startWaitSeconds * 1000L
			while (System.currentTimeMillis() < signalDeadline && !startSignal.exists() && gradleProcess.isAlive()) {
				Thread.sleep(100L)
			}

			if (!startSignal.exists()) {
				logger.error('Client GameTest recording-start signal was not seen before the GameTest finished or timed out.')
			} else {
				logger.lifecycle("Recording virtual display ${xvfbDisplay} to ${output.absolutePath}")
				def videoSize = xvfbScreen.split('x')[0] + 'x' + xvfbScreen.split('x')[1]
				def ffmpegCommand = [
						'ffmpeg', '-y',
						'-f', 'x11grab', '-framerate', fps, '-video_size', videoSize, '-draw_mouse', '0', '-i', "${xvfbDisplay}.0",
						'-f', 'pulse', '-thread_queue_size', '1024', '-i', audioSource,
						'-map', '0:v:0', '-map', '1:a:0', '-c:v', 'libx264', '-preset', 'veryfast', '-crf', '23', '-pix_fmt', 'yuv420p',
						'-c:a', 'aac', '-b:a', '160k', '-shortest', output.absolutePath
				]
				def ffmpegBuilder = new ProcessBuilder(ffmpegCommand.collect { it.toString() })
				ffmpegBuilder.directory(project.projectDir)
				ffmpegBuilder.redirectErrorStream(true)
				ffmpegBuilder.environment().putAll(processEnvironment)
				ffmpegProcess = ffmpegBuilder.start()
				Thread.startDaemon('ffmpeg-output') {
					ffmpegProcess.inputStream.eachLine(StandardCharsets.UTF_8.name()) { line ->
						println(line)
					}
				}
				readySignal.text = Long.toString(System.currentTimeMillis())
			}

			gradleStatus = gradleProcess.waitFor()
			logThread.join(1000L)
		} finally {
			if (ffmpegProcess != null && ffmpegProcess.isAlive()) {
				runCommand(['kill', '-INT', ffmpegProcess.pid().toString()], [:], true)
				ffmpegProcess.waitFor(10, java.util.concurrent.TimeUnit.SECONDS)
				if (ffmpegProcess.isAlive()) {
					ffmpegProcess.destroyForcibly()
				}
			}
			if (!previousDefaultSinkId.isBlank()) {
				runCommand(['wpctl', 'set-default', previousDefaultSinkId], [:], true)
			}
			if (!audioSinkId.isBlank()) {
				runCommand(['pw-cli', 'destroy', audioSinkId], [:], true)
			}
			if (xvfbProcess != null && xvfbProcess.isAlive()) {
				xvfbProcess.destroy()
				xvfbProcess.waitFor(2, java.util.concurrent.TimeUnit.SECONDS)
				if (xvfbProcess.isAlive()) {
					xvfbProcess.destroyForcibly()
				}
			}
			startSignal.delete()
			readySignal.delete()
			alsoftConfig.delete()
		}

		if (output.isFile() && runCommand(['ffprobe', '-v', 'error', '-show_entries', 'format=duration', '-of', 'default=noprint_wrappers=1:nokey=1', output.absolutePath], [:], true).status == 0) {
			videoSaved = true
			logger.lifecycle("Recording saved: ${output.absolutePath}")
		}
		if (videoSaved) {
			def audioProbe = runCommand(['ffprobe', '-v', 'error', '-select_streams', 'a', '-show_entries', 'stream=codec_type', '-of', 'csv=p=0', output.absolutePath], [:], true)
			if (!audioProbe.output.trim().isBlank()) {
				audioSaved = true
				logger.lifecycle("Recording audio stream saved: ${audioSource}")
			} else {
				recordingStatus = 1
				logger.error('Recording was saved without an audio stream.')
			}
		}

		def resolvedRunDir = runDir.exists() ? runDir.canonicalFile : null
		if (resolvedRunDir != null) {
			copyDirectory(resolvedRunDir, keptRunDir)
			logger.lifecycle("Client GameTest run directory saved: ${keptRunDir.absolutePath}")
		} else {
			recordingStatus = 1
			logger.error("Client GameTest run directory was not found: ${runDir}")
		}

		def selectedProfile = processEnvironment.get('CLIENT_GAMETEST_PROFILE')
		def selectedOnly = processEnvironment.get('CLIENT_GAMETEST_ONLY')
		def selectedSuite = processEnvironment.get('CLIENT_GAMETEST_SUITE')

		def metadataModel = [
				name              : recordingName,
				profile           : recordingProfile,
				trace             : recordingTrace.gtrTruthy(),
				startedAt         : recordingStartedAt,
				finishedAt        : DateTimeFormatter.ISO_INSTANT.format(Instant.now()),
				gradleStatus      : gradleStatus,
				captureMode       : 'xvfb',
				fps               : fps,
				xvfbScreen        : xvfbScreen,
				video             : output.absolutePath,
				videoSaved        : videoSaved,
				audioRequested    : true,
				audioRoute        : 'virtual',
				audioSource       : audioSource,
				audioSink         : audioSinkName,
				audioSaved        : audioSaved,
				recordingDirectory: recordingDir.canonicalPath,
				runDirectory      : resolvedRunDir?.absolutePath,
				keptRunDirectory  : keptRunDir.exists() ? keptRunDir.absolutePath : null,
				selectors         : [
						'CLIENT_GAMETEST_PROFILE': selectedProfile,
						'CLIENT_GAMETEST_ONLY'   : selectedOnly,
						'CLIENT_GAMETEST_SUITE'  : selectedSuite
				],
				gradleArgs        : []
		]
		metadata.text = JsonOutput.prettyPrint(JsonOutput.toJson(metadataModel)) + System.lineSeparator()
		logger.lifecycle("Recording metadata saved: ${metadata.absolutePath}")

		if (gradleStatus != 0) {
			throw new GradleException("Client GameTest failed with status ${gradleStatus}.")
		}
		if (recordingStatus != 0) {
			throw new GradleException('Client GameTest recording failed.')
		}
	}
}

afterEvaluate {
	tasks.matching { it.name == 'runClientGameTest' }.configureEach {
		dependsOn(prepareTask)
		jvmArgs '-Dfabric.client.gametest.disableNetworkSynchronizer=true'
		jvmArgs "-D${extension.enabledProperty.get()}=true"
		extension.additionalEnabledProperties.get().findAll { propertyName -> propertyName != null && !propertyName.isBlank() }.each { propertyName ->
			jvmArgs "-D${propertyName.strip()}=true"
		}
		['ALSOFT_CONF', 'ALSOFT_DRIVERS', 'PULSE_SINK'].each { name ->
			def value = providers.environmentVariable(name).orNull
			if (value != null && !value.isBlank()) {
				environment(name, value)
			}
		}
		if (providers.environmentVariable(extension.managedXvfbEnv.get()).map { it.toBoolean() }.getOrElse(false)) {
			useXvfb.set(false)
		}
	}
}
